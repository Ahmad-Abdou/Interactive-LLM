<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="../static/css/style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interactive Chat App</title>
  </head>
  <body>
    <div id="container">
      <div id="chat-area">
        <div class="message bot">Hello! How can I help you?</div>
      </div>
      <form id="input-area" autocomplete="off">
        <input id="input-box" type="text" placeholder="Type your message..." required />
        <button id="send-btn" type="submit">Send</button>
      </form>
    </div>
    <script src="../static/js/main.js"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="/static/js/underfitting_overfitting.js"></script>
  </body>
</html>
